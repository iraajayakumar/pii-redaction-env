name: pii-redaction-env
version: "0.1.0"
description: >
  An RL environment where an AI agent acts as an automated Data Privacy Officer,
  redacting PII from Indian documents under the DPDP Act 2023.
  Supports three difficulty levels: easy, medium, hard.
tags:
  - openenv
  - privacy
  - pii
  - compliance
  - india
  - dpdp
author: Iraa Jayakumar
tasks:
  - name: easy
    description: Direct PII detection — Aadhaar, PAN, phone, email, bank account, IFSC
    difficulty: easy
  - name: medium
    description: Contextual PII in medical and legal documents
    difficulty: medium
  - name: hard
    description: Adversarial de-anonymisation resistance
    difficulty: hard